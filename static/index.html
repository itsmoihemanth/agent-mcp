<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentMCP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ---- Theme tokens ---- */
  :root {
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --dur: 150ms;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --max-content: 740px;
  }

  /* Dark (default) */
  :root, [data-theme="dark"] {
    --bg-base: #111113;
    --bg-surface: #18181b;
    --bg-elevated: #202023;
    --bg-input: #1c1c1f;
    --bg-hover: rgba(255,255,255,0.04);
    --bg-user-msg: #27272a;
    --border-subtle: #27272a;
    --border-default: #303033;
    --text-primary: #ececef;
    --text-secondary: #8b8b92;
    --text-tertiary: #55555c;
    --text-on-accent: #fff;
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,0.12);
    --green: #34d399;
    --orange: #f59e0b;
    --red: #ef4444;
    --code-bg: #0c0c0e;
    --code-text: #c4c4cc;
    --overlay: rgba(0,0,0,0.6);
  }

  /* Light */
  [data-theme="light"] {
    --bg-base: #ffffff;
    --bg-surface: #f8f8fa;
    --bg-elevated: #f0f0f3;
    --bg-input: #ffffff;
    --bg-hover: rgba(0,0,0,0.03);
    --bg-user-msg: #f0f0f3;
    --border-subtle: #e8e8ec;
    --border-default: #d4d4d9;
    --text-primary: #18181b;
    --text-secondary: #6e6e76;
    --text-tertiary: #a0a0a8;
    --text-on-accent: #fff;
    --accent: #2563eb;
    --accent-dim: rgba(37,99,235,0.08);
    --green: #059669;
    --orange: #d97706;
    --red: #dc2626;
    --code-bg: #f4f4f6;
    --code-text: #374151;
    --overlay: rgba(0,0,0,0.3);
  }

  /* ---- Reset ---- */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Header ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
  .status-pills { display: flex; gap: 8px; }
  .pill {
    font-size: 11px; padding: 3px 8px; border-radius: 9999px;
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
  }
  .pill .dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }
  .dot-ok { background: var(--green); }
  .dot-off { background: var(--text-tertiary); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .theme-btn {
    background: none; border: 1px solid var(--border-subtle);
    color: var(--text-secondary); width: 30px; height: 30px;
    border-radius: var(--radius-md); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
    font-size: 14px;
  }
  .theme-btn:hover { background: var(--bg-hover); border-color: var(--border-default); }

  /* ---- Layout ---- */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 240px; border-right: 1px solid var(--border-subtle);
    background: var(--bg-surface); display: flex; flex-direction: column;
    padding: 16px; gap: 20px; overflow-y: auto; flex-shrink: 0;
    scrollbar-width: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .sidebar-section h3 {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-tertiary); margin-bottom: 8px;
  }
  .sidebar-list { display: flex; flex-direction: column; gap: 2px; }
  .sidebar-item {
    font-size: 13px; padding: 6px 10px; border-radius: var(--radius-sm);
    color: var(--text-secondary); cursor: default;
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  }
  .sidebar-item:hover { background: var(--bg-hover); }
  .sidebar-item.active { color: var(--text-primary); background: var(--accent-dim); }
  .sidebar-item.clickable { cursor: pointer; }
  .sidebar-item.clickable:hover { color: var(--text-primary); }

  /* Upload */
  .upload-zone {
    border: 1px dashed var(--border-default); border-radius: var(--radius-md);
    padding: 12px; text-align: center; cursor: pointer;
    font-size: 12px; color: var(--text-tertiary);
    transition: all var(--dur) var(--ease);
  }
  .upload-zone:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .upload-zone.uploading { border-color: var(--orange); color: var(--orange); }
  .upload-zone.done { border-color: var(--green); color: var(--green); }
  .upload-status { font-size: 11px; margin-top: 6px; color: var(--text-tertiary); }

  /* ---- Chat ---- */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .messages {
    flex: 1; overflow-y: auto; padding: 32px 24px;
    display: flex; flex-direction: column; gap: 24px;
    scrollbar-width: thin; scrollbar-color: var(--border-subtle) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }

  /* Message layout — no bubbles on AI, subtle pill on user */
  .msg { max-width: var(--max-content); width: 100%; }
  .msg-exchange { display: flex; flex-direction: column; gap: 12px; }

  .msg-user {
    align-self: flex-end; max-width: 600px;
    background: var(--bg-user-msg); color: var(--text-primary);
    padding: 10px 16px; border-radius: 18px 18px 4px 18px;
    font-size: 14px; line-height: 1.5;
  }

  .msg-ai {
    font-size: 15px; line-height: 1.65; color: var(--text-primary);
    /* No background, no border, no bubble — document style */
  }
  .msg-ai p { margin: 4px 0; }
  .msg-ai strong { font-weight: 600; }
  .msg-ai code {
    font-family: var(--font-mono); font-size: 13px;
    background: var(--bg-elevated); padding: 1px 6px;
    border-radius: 3px;
  }
  .msg-ai pre {
    background: var(--code-bg); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md); padding: 14px 16px;
    overflow-x: auto; font-size: 13px; line-height: 1.55;
    margin: 10px 0; font-family: var(--font-mono); color: var(--code-text);
  }

  /* Metadata — subtle, appears below response */
  .msg-meta {
    display: flex; gap: 8px; margin-top: 6px; font-size: 11px;
    color: var(--text-tertiary); flex-wrap: wrap; align-items: center;
    opacity: 0; transition: opacity var(--dur) var(--ease);
  }
  .msg-exchange:hover .msg-meta { opacity: 1; }
  .msg-meta .tag {
    font-family: var(--font-mono); font-size: 10px;
    font-variant-numeric: tabular-nums;
  }
  .msg-meta .tag-tool { color: var(--accent); }
  .msg-meta .tag-sep { color: var(--border-default); }
  .msg-meta .tag-link { cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  .msg-meta .tag-link:hover { color: var(--text-secondary); }

  .msg-system {
    text-align: center; font-size: 13px;
    color: var(--text-tertiary); padding: 8px 0;
  }

  /* Thinking dots */
  .thinking { display: flex; gap: 5px; padding: 8px 0; }
  .thinking span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-tertiary);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.15s; }
  .thinking span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.25; }
    40% { opacity: 1; }
  }

  /* ---- Input ---- */
  .input-area {
    padding: 16px 24px 20px; border-top: 1px solid var(--border-subtle);
    background: var(--bg-surface);
  }
  .input-wrap {
    max-width: var(--max-content); margin: 0 auto;
    display: flex; gap: 8px; align-items: flex-end;
  }
  .input-wrap textarea {
    flex: 1; background: var(--bg-input);
    border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
    padding: 12px 16px; color: var(--text-primary);
    font-family: var(--font-sans); font-size: 15px;
    resize: none; outline: none; max-height: 160px;
    line-height: 1.5; scrollbar-width: none;
    transition: border-color var(--dur) var(--ease);
  }
  .input-wrap textarea::-webkit-scrollbar { display: none; }
  .input-wrap textarea:focus { border-color: var(--accent); }
  .input-wrap textarea::placeholder { color: var(--text-tertiary); }
  .send-btn {
    width: 40px; height: 40px; border-radius: var(--radius-md);
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity var(--dur) var(--ease);
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { fill: var(--text-on-accent); width: 16px; height: 16px; }

  /* ---- Trace modal ---- */
  .trace-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--overlay); z-index: 100;
    align-items: center; justify-content: center;
  }
  .trace-overlay.open { display: flex; }
  .trace-modal {
    background: var(--bg-surface); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg); width: 640px; max-height: 75vh;
    overflow-y: auto; padding: 24px; scrollbar-width: thin;
  }
  .trace-modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .trace-summary {
    font-size: 12px; color: var(--text-tertiary);
    font-family: var(--font-mono); margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border-subtle);
  }
  .trace-step {
    padding: 8px 12px; border-left: 2px solid var(--border-subtle);
    margin-left: 4px; margin-bottom: 6px; font-size: 12px;
  }
  .trace-step.tool-step { border-color: var(--accent); }
  .trace-step-label {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--text-tertiary);
  }
  .trace-step-body { margin-top: 3px; color: var(--text-secondary); word-break: break-word; font-size: 12px; }
  .trace-close {
    float: right; background: var(--bg-elevated); border: 1px solid var(--border-subtle);
    color: var(--text-secondary); padding: 4px 12px; border-radius: var(--radius-sm);
    cursor: pointer; font-family: var(--font-sans); font-size: 12px;
    transition: background var(--dur) var(--ease);
  }
  .trace-close:hover { background: var(--bg-hover); }

  @media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">AgentMCP</div>
    <div class="status-pills">
      <span class="pill" id="status-health"><span class="dot dot-off"></span>--</span>
      <span class="pill" id="status-tools"><span class="dot dot-off"></span>0 tools</span>
    </div>
  </div>
  <div class="header-right">
    <button class="theme-btn" id="theme-toggle" title="Toggle theme"></button>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-section">
      <h3>Tools</h3>
      <div id="tool-list" class="sidebar-list">
        <div class="sidebar-item">loading...</div>
      </div>
    </div>
    <div class="sidebar-section">
      <h3>Documents</h3>
      <div id="upload-area" class="upload-zone">
        Upload a file to ingest
        <input type="file" id="file-input" accept=".txt,.pdf,.md" style="display:none">
      </div>
      <div id="ingest-status" class="upload-status"></div>
    </div>
    <div class="sidebar-section">
      <h3>Examples</h3>
      <div id="examples" class="sidebar-list"></div>
    </div>
  </aside>

  <div class="chat-area">
    <div id="messages" class="messages">
      <div class="msg-system">Ask a question, run code, fetch a URL, or query your documents.</div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Message AgentMCP..."></textarea>
        <button class="send-btn" id="send-btn">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="trace-overlay" class="trace-overlay">
  <div class="trace-modal">
    <button class="trace-close" id="trace-close-btn">close</button>
    <h3 id="trace-title">Execution Trace</h3>
    <div id="trace-body"></div>
  </div>
</div>

<script>
var API = window.location.origin;
var messagesEl = document.getElementById('messages');
var inputEl = document.getElementById('input');
var sendBtn = document.getElementById('send-btn');
var traceOverlay = document.getElementById('trace-overlay');

// ---- Util ----
function el(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}

// ---- Theme ----
function getSystemTheme() {
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-toggle').textContent = t === 'dark' ? '\u263E' : '\u2600';
}
(function initTheme() {
  var saved = localStorage.getItem('agentmcp_theme');
  applyTheme(saved || getSystemTheme());
})();
document.getElementById('theme-toggle').addEventListener('click', function() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('agentmcp_theme', next);
  applyTheme(next);
});
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
  if (!localStorage.getItem('agentmcp_theme')) applyTheme(getSystemTheme());
});

// ---- Boot ----
async function boot() {
  try {
    var h = await fetch(API + '/health').then(function(r) { return r.json(); });
    var hel = document.getElementById('status-health');
    hel.textContent = '';
    var d = el('span', 'dot ' + (h.status === 'healthy' ? 'dot-ok' : 'dot-off'));
    hel.appendChild(d);
    hel.appendChild(document.createTextNode(' ' + h.status));
  } catch {}
  try {
    var tools = await fetch(API + '/tools').then(function(r) { return r.json(); });
    var tel = document.getElementById('status-tools');
    tel.textContent = '';
    tel.appendChild(el('span', 'dot dot-ok'));
    tel.appendChild(document.createTextNode(' ' + tools.length + ' tools'));
    var list = document.getElementById('tool-list');
    list.textContent = '';
    tools.forEach(function(t) {
      var item = el('div', 'sidebar-item', t.name);
      item.title = t.description;
      list.appendChild(item);
    });
  } catch {}
  var examples = [
    ['What is 256 * 37 + 19?', 'calculator'],
    ['Generate 5 random passwords', 'python'],
    ['Summarize https://news.ycombinator.com', 'fetch'],
    ['List the available files', 'mcp'],
    ['What is HybridNAV?', 'rag'],
  ];
  var exList = document.getElementById('examples');
  examples.forEach(function(ex) {
    var item = el('div', 'sidebar-item clickable', ex[0]);
    item.addEventListener('click', function() { sendExample(ex[0]); });
    exList.appendChild(item);
  });
}
boot();

// ---- Session ----
var threadId = sessionStorage.getItem('agentmcp_thread') || crypto.randomUUID();
sessionStorage.setItem('agentmcp_thread', threadId);

// ---- Chat ----
var busy = false;
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});
sendBtn.addEventListener('click', send);

async function send() {
  var text = inputEl.value.trim();
  if (!text || busy) return;
  busy = true; sendBtn.disabled = true;
  inputEl.value = ''; inputEl.style.height = 'auto';

  var exchange = el('div', 'msg-exchange');
  exchange.appendChild(el('div', 'msg-user', text));
  var thinkingDiv = el('div', 'thinking');
  for (var i = 0; i < 3; i++) thinkingDiv.appendChild(el('span'));
  exchange.appendChild(thinkingDiv);
  messagesEl.appendChild(exchange);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    var res = await fetch(API + '/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, thread_id: threadId }),
    });
    var data = await res.json();
    thinkingDiv.remove();
    if (data.error) {
      exchange.appendChild(el('div', 'msg-system', 'Error: ' + data.message));
    } else {
      exchange.appendChild(renderResponse(data));
      highlightTools(data.tools_used || []);
    }
  } catch (err) {
    thinkingDiv.remove();
    exchange.appendChild(el('div', 'msg-system', 'Connection error: ' + err.message));
  }
  busy = false; sendBtn.disabled = false;
  messagesEl.scrollTop = messagesEl.scrollHeight;
  inputEl.focus();
}

function sendExample(text) { inputEl.value = text; send(); }

// ---- Render response ----
function renderResponse(data) {
  var wrap = el('div', 'msg');
  var ai = renderMarkdown(data.response);
  ai.className = 'msg-ai';
  wrap.appendChild(ai);

  var meta = data.metadata || {};
  var tools = data.tools_used || [];
  var tokens = (meta.token_usage || {}).total_tokens;
  var cost = meta.cost_estimate;
  var dur = meta.duration_ms;
  var runId = meta.run_id;

  var metaDiv = el('div', 'msg-meta');
  if (tools.length) {
    tools.forEach(function(t) { metaDiv.appendChild(el('span', 'tag tag-tool', t)); });
    metaDiv.appendChild(el('span', 'tag tag-sep', '\u00b7'));
  }
  if (dur) { metaDiv.appendChild(el('span', 'tag', dur + 'ms')); }
  if (tokens) { metaDiv.appendChild(el('span', 'tag', tokens + ' tok')); }
  if (cost) { metaDiv.appendChild(el('span', 'tag', '$' + cost.toFixed(5))); }
  if (runId) {
    var link = el('span', 'tag tag-link', 'trace');
    link.addEventListener('click', function() { showTrace(runId); });
    metaDiv.appendChild(link);
  }
  wrap.appendChild(metaDiv);
  return wrap;
}

function renderMarkdown(text) {
  var container = document.createElement('div');
  var parts = text.split(/```(\w*)\n?([\s\S]*?)```/g);
  var i = 0;
  while (i < parts.length) {
    if (i % 3 === 0) {
      var segment = parts[i];
      if (segment && segment.trim()) {
        segment.split('\n\n').forEach(function(para) {
          if (!para.trim()) return;
          var p = document.createElement('p');
          var lines = para.split('\n');
          lines.forEach(function(line, li) {
            var inlineParts = line.split(/`([^`]+)`/g);
            inlineParts.forEach(function(part, pi) {
              if (pi % 2 === 1) {
                var c = document.createElement('code');
                c.textContent = part;
                p.appendChild(c);
              } else {
                var boldParts = part.split(/\*\*([^*]+)\*\*/g);
                boldParts.forEach(function(bp, bi) {
                  if (bi % 2 === 1) {
                    var b = document.createElement('strong');
                    b.textContent = bp;
                    p.appendChild(b);
                  } else if (bp) {
                    p.appendChild(document.createTextNode(bp));
                  }
                });
              }
            });
            if (li < lines.length - 1) p.appendChild(document.createElement('br'));
          });
          container.appendChild(p);
        });
      }
    } else if (i % 3 === 2) {
      var pre = document.createElement('pre');
      var code = document.createElement('code');
      code.textContent = parts[i];
      pre.appendChild(code);
      container.appendChild(pre);
    }
    i++;
  }
  return container;
}

function highlightTools(used) {
  document.querySelectorAll('#tool-list .sidebar-item').forEach(function(item) {
    item.classList.toggle('active', used.indexOf(item.textContent) !== -1);
  });
  setTimeout(function() {
    document.querySelectorAll('#tool-list .sidebar-item.active').forEach(function(i) {
      i.classList.remove('active');
    });
  }, 3000);
}

// ---- Trace ----
document.getElementById('trace-close-btn').addEventListener('click', closeTrace);
traceOverlay.addEventListener('click', function(e) { if (e.target === traceOverlay) closeTrace(); });

async function showTrace(runId) {
  try {
    var data = await fetch(API + '/agent/trace/' + runId).then(function(r) { return r.json(); });
    document.getElementById('trace-title').textContent = 'Trace ' + runId.slice(0, 8);
    var body = document.getElementById('trace-body');
    body.textContent = '';

    var sum = el('div', 'trace-summary',
      data.total_duration_ms + 'ms  \u00b7  '
      + ((data.token_usage || {}).total_tokens || '?') + ' tokens  \u00b7  $'
      + (data.cost_estimate || 0).toFixed(5));
    body.appendChild(sum);

    (data.steps || []).forEach(function(s) {
      var step = el('div', 'trace-step' + (s.tool_name ? ' tool-step' : ''));
      step.appendChild(el('div', 'trace-step-label',
        s.node + (s.tool_name ? ' / ' + s.tool_name : '') + '  ' + s.latency_ms + 'ms'));
      step.appendChild(el('div', 'trace-step-body',
        ((s.output || s.input || '') + '').slice(0, 300)));
      body.appendChild(step);
    });
    traceOverlay.classList.add('open');
  } catch (e) { alert('Could not load trace: ' + e.message); }
}
function closeTrace() { traceOverlay.classList.remove('open'); }

// ---- Upload ----
var uploadArea = document.getElementById('upload-area');
var fileInput = document.getElementById('file-input');
uploadArea.addEventListener('click', function() { fileInput.click(); });
fileInput.addEventListener('change', async function() {
  var file = this.files[0]; if (!file) return;
  var status = document.getElementById('ingest-status');
  uploadArea.className = 'upload-zone uploading';
  uploadArea.textContent = 'Ingesting ' + file.name + '...';
  status.textContent = '';
  var form = new FormData(); form.append('file', file);
  try {
    var res = await fetch(API + '/rag/ingest', { method: 'POST', body: form });
    var data = await res.json();
    if (data.error) {
      uploadArea.className = 'upload-zone';
      uploadArea.textContent = 'Upload a file to ingest';
      status.textContent = 'Error: ' + data.message; status.style.color = 'var(--red)';
    } else {
      uploadArea.className = 'upload-zone done';
      uploadArea.textContent = data.document_name;
      status.textContent = data.chunks_ingested + ' chunks indexed';
      status.style.color = 'var(--green)';
      var sys = el('div', 'msg-system', 'Ingested "' + data.document_name
        + '" (' + data.chunks_ingested + ' chunks)');
      messagesEl.appendChild(sys);
    }
  } catch {
    uploadArea.className = 'upload-zone';
    uploadArea.textContent = 'Upload a file to ingest';
    status.textContent = 'Upload failed'; status.style.color = 'var(--red)';
  }
  fileInput.value = '';
  setTimeout(function() {
    uploadArea.className = 'upload-zone';
    uploadArea.textContent = 'Upload a file to ingest';
  }, 5000);
});
</script>
</body>
</html>
